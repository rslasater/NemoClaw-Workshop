services:
  email-api:
    build: ./fake-email-api
    ports:
      - "8000:8000"
    environment:
      STUDENT_ID: ${STUDENT_ID:-student-01}
      STUDENT_EMAIL: ${STUDENT_EMAIL:-student-01@workshop.example}
      EMAIL_API_DB: /app/data/email_lab.sqlite
    volumes:
      - email_api_data:/app/data

volumes:
  email_api_data:
